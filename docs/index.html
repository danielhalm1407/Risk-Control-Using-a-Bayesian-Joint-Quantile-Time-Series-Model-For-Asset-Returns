<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Figures</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5b6578;
        --border: #d7deea;
        --shadow: 0 18px 50px rgba(23, 32, 51, 0.10);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(160, 197, 255, 0.22), transparent 32%),
          linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 18px;
        max-width: 75ch;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .figure-shell {
        margin-top: 28px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      iframe {
        width: 100%;
        height: 900px;
        border: 0;
        border-radius: 12px;
        background: #fff;
      }

      .links {
        margin-top: 14px;
        font-size: 0.98rem;
      }

      a {
        color: #1b4fd1;
      }

      @media (max-width: 768px) {
        main {
          padding: 28px 14px 40px;
        }

        iframe {
          height: 700px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Interactive Figures</h1>
      <p>
        This page embeds the Plotly figure stored in <code>docs/figures/level_figure.html</code>.
        If the embedded view does not load, open the standalone figure directly using the link below.
      </p>

      <section class="figure-shell" aria-labelledby="level-figure-heading">
        <iframe
          id="level-figure"
          src="figures/level_figure.html"
          title="Interactive level figure"
          loading="lazy">
        </iframe>
        <div class="links">
          <a href="figures/level_figure.html">Open the standalone interactive figure</a>
        </div>
      </section>
    </main>
  </body>
</html>
